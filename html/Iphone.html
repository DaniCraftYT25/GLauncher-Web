<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Seguridad de Apple</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Fuente SF Pro (San Francisco) aproximada */
        @font-face {
            font-family: "SF Pro Display";
            src: url("https://db.onlinewebfonts.com/t/6070554952002524a873398cdcf8479e.woff2") format("woff2");
        }

        @font-face {
            font-family: "SF Pro Rounded";
            src: url("https://db.onlinewebfonts.com/t/1633519163276632c0202958742d17c5.woff2") format("woff2");
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Marco del iPhone 15 Pro */
        .iphone-15 {
            width: 340px;
            height: 700px;
            background-color: #000;
            border-radius: 54px;
            border: 10px solid #2d2d2d; /* Color titanio */
            position: relative;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), 
                        inset 0 0 10px rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Dynamic Island Pro Mejorada */
        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 95px;
            height: 28px;
            background: #000;
            border-radius: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }
        .dynamic-island .camera {
            width: 10px;
            height: 10px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 0 2px rgba(255,255,255,0.2);
            position: relative;
        }
        .dynamic-island .camera::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 2px;
            height: 2px;
            background: rgba(100, 100, 255, 0.1);
            border-radius: 50%;
        }
        /* Animación de expansión */
        .dynamic-island.expanded {
            width: 160px;
            height: 35px;
        }
        .island-content {
            color: white;
            font-size: 11px;
            margin-right: auto;
            display: none;
            white-space: nowrap;
            font-weight: 600;
        }
        .dynamic-island.expanded .island-content {
            display: block;
        }
        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 18px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
            box-sizing: border-box;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            z-index: 11;
        }
        .status-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        /* Pantalla de Bloqueo */
        #lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../images/image.png') no-repeat center center;
            background-size: cover;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }
        .lock-content {
            margin-top: 110px;
            text-align: center;
        }
        #clock {
            font-family: "SF Pro Rounded", sans-serif;
            font-size: 96px;
            font-weight: 600; /* Más fino y estilizado */
            margin: 0;
            letter-spacing: -3px;
            color: #000;
            line-height: 1;
        }
        #date {
            font-size: 22px;
            font-weight: 600;
            color: #000;
            margin-bottom: 5px;
        }
        .lock-icon {
            font-size: 24px;
            opacity: 0.8;
            margin-bottom: 10px;
            color: #000;
        }
        .swipe-up-text {
            position: absolute;
            bottom: 40px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
        /* Estado Desbloqueado */
        .iphone-15.unlocked #lock-screen {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        /* Contenido de la borma */
        .screen-content {
            flex: 1;
            padding: 80px 25px 30px;
            background: url('https://images.wallpapersden.com/image/download/iphone-15-stock-gradient_bWlpZ2uUmZqaraWkpJRmbmdlrWZnZ2U.jpg') no-repeat center center;
            background-size: cover;
            color: #fff;
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .iphone-15.unlocked .screen-content {
            opacity: 1;
        }
        /* Estilo para los Iconos de Apps */
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            animation: zoomIn 0.5s ease forwards;
            opacity: 0;
        }
        .app-box {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .app-label {
            font-size: 11px;
            font-weight: 500;
        }
        @keyframes zoomIn {
            from { transform: scale(1.5); opacity: 0; filter: blur(10px); }
            to { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* Barra de Inicio (Home Bar) */
        .home-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
            opacity: 0.7;
            z-index: 30;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="iphone-15" id="iphone-device">
        <div class="dynamic-island" id="dynamic-island" onclick="expandIsland()">
            <div class="island-content" id="island-msg"><i class="fas fa-user-check"></i> Face ID</div>
            <div class="camera"></div>
        </div>
        
        <div class="status-bar">
            <div class="status-left" id="status-time">9:41</div>
            <div class="status-right">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <div id="lock-screen">
            <div class="lock-content">
                <div class="lock-icon"><i class="fas fa-lock"></i></div>
                <div id="date">Lunes, 1 de enero</div>
                <h1 id="clock">00:00</h1>
            </div>
            <div class="swipe-up-text">Desliza hacia arriba para abrir</div>
        </div>

        <div class="screen-content">
            <!-- Placeholder para Apps -->
            <div class="app-icon" style="animation-delay: 0.1s;">
                <div class="app-box" style="background: linear-gradient(#5856d6, #af52de);"><i class="fab fa-app-store-ios" style="color: white;"></i></div>
                <span class="app-label">App Store</span>
            </div>
        </div>
        <div class="home-bar" onclick="unlockIphone()"></div>
    </div>

    <script>
        function expandIsland() {
            const island = document.getElementById('dynamic-island');
            const msg = document.getElementById('island-msg');
            island.classList.add('expanded');
            msg.innerHTML = '<i class="fas fa-shield-alt"></i> Seguridad';
            
            setTimeout(() => {
                island.classList.remove('expanded');
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // Actualizar reloj principal y barra de estado
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            document.getElementById('status-time').textContent = `${hours}:${minutes}`;

            // Actualizar fecha
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            const dateStr = now.toLocaleDateString('es-ES', options);
            document.getElementById('date').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }

        function unlockIphone() {
            const device = document.getElementById('iphone-device');
            const island = document.getElementById('dynamic-island');
            const msg = document.getElementById('island-msg');

            if (!device.classList.contains('unlocked')) {
                // Simular Face ID en la Isla Dinámica
                island.classList.add('expanded');
                msg.innerHTML = '<i class="fas fa-user-check"></i> Face ID';
                
                setTimeout(() => {
                    island.classList.remove('expanded');
                device.classList.add('unlocked');
                
                // Sonido opcional de desbloqueo
                const audio = new Audio('https://www.soundjay.com/buttons_c2026/sounds/button-20.mp3');
                audio.volume = 0.5;
                audio.play().catch(() => {});
                }, 800);
            }
        }

        // Iniciar reloj
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
